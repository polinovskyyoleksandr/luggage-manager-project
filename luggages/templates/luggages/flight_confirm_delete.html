{% extends 'base.html' %} {% load static %} {% block head %}
<link
  rel="stylesheet"
  href="{% static 'css/flights/flight-form.css' %}"
/>
{% endblock %} {% block content %}

<h2>Are you sure you want to delete {{ flight.flight_number }}?</h2>

<form action="" method="post" class="form">
    {% csrf_token %}
    <a href="{% url 'flight-detail' flight.id %}" class="btnCancel">Cancel</a>
    <button type="submit" class="btnDelete">Yes - Delete!</button>
</form>

{% endblock %}
